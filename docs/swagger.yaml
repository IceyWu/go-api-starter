basePath: /
definitions:
  handler.AbortMultipartRequest:
    properties:
      key:
        type: string
      upload_id:
        type: string
    required:
    - key
    - upload_id
    type: object
  handler.GetPartURLRequest:
    properties:
      key:
        type: string
      part_numbers:
        items:
          type: integer
        type: array
      upload_id:
        type: string
    required:
    - key
    - part_numbers
    - upload_id
    type: object
  handler.HealthResponse:
    properties:
      status:
        type: string
      timestamp:
        type: string
      uptime:
        type: string
      version:
        type: string
    type: object
  handler.ReadinessResponse:
    properties:
      checks:
        additionalProperties:
          type: string
        type: object
      status:
        type: string
    type: object
  handler.UploadCompleteRequest:
    properties:
      file_name:
        type: string
      file_size:
        type: integer
      is_private:
        type: boolean
      key:
        type: string
      md5:
        type: string
      parts:
        description: 分片上传专用
        items:
          $ref: '#/definitions/service.CompletePart'
        type: array
      upload_id:
        description: 分片上传专用
        type: string
    required:
    - file_name
    - file_size
    - key
    - md5
    type: object
  handler.UploadInitRequest:
    properties:
      chunk_size:
        description: 可选，不传则使用默认值或普通上传
        type: integer
      file_name:
        type: string
      file_size:
        type: integer
      md5:
        type: string
    required:
    - file_name
    - file_size
    - md5
    type: object
  model.AvatarFileResponse:
    properties:
      sec_uid:
        type: string
      url:
        type: string
    type: object
  model.CreatePermissionRequest:
    properties:
      code:
        example: USER_CREATE
        maxLength: 50
        minLength: 2
        type: string
      description:
        example: 允许创建新用户
        maxLength: 500
        type: string
      module:
        example: user
        maxLength: 100
        type: string
      name:
        example: 创建用户
        maxLength: 100
        minLength: 2
        type: string
      space_id:
        example: 1
        type: integer
    required:
    - code
    - name
    - space_id
    type: object
  model.CreateRoleRequest:
    properties:
      description:
        example: 系统管理员
        maxLength: 500
        type: string
      name:
        example: admin
        maxLength: 100
        minLength: 2
        type: string
      permission_codes:
        example:
        - USER_CREATE
        - USER_READ
        items:
          type: string
        type: array
    required:
    - name
    type: object
  model.CreateSpaceRequest:
    properties:
      description:
        example: 用户管理权限空间
        maxLength: 500
        type: string
      name:
        example: user
        maxLength: 100
        minLength: 2
        type: string
    required:
    - name
    type: object
  model.CreateUserRequest:
    properties:
      email:
        example: john@example.com
        type: string
      mobile:
        example: "13800138000"
        type: string
      username:
        example: john_doe
        maxLength: 50
        minLength: 1
        type: string
    type: object
  model.File:
    properties:
      created_at:
        type: string
      extension:
        type: string
      file_md5:
        type: string
      height:
        type: integer
      is_private:
        type: boolean
      key:
        description: OSS 存储路径（相对路径）
        type: string
      name:
        type: string
      path:
        type: string
      sec_uid:
        type: string
      size:
        type: integer
      type:
        description: MIME type
        type: string
      updated_at:
        type: string
      url:
        description: URL 由 Key + BaseURL 动态生成，不存数据库
        type: string
      user:
        allOf:
        - $ref: '#/definitions/model.User'
        description: Relations
      width:
        type: integer
    type: object
  model.LoginRequest:
    properties:
      account:
        description: 账号：邮箱或手机号，自动识别
        example: admin@example.com
        type: string
      code:
        description: 验证码登录时使用
        example: "123456"
        type: string
      login_type:
        description: '"code" 表示验证码登录，空或其他表示密码登录'
        example: code
        type: string
      password:
        example: password123
        minLength: 6
        type: string
    required:
    - account
    type: object
  model.LoginResponse:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      expires_in:
        description: access_token 过期时间（秒）
        example: 86400
        type: integer
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      user:
        $ref: '#/definitions/model.UserResponse'
    type: object
  model.Permission:
    properties:
      code:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      module:
        type: string
      name:
        type: string
      position:
        description: 0-63
        type: integer
      space:
        $ref: '#/definitions/model.PermissionSpace'
      space_id:
        type: integer
      updated_at:
        type: string
      value:
        description: 2^position
        type: integer
    type: object
  model.PermissionDetail:
    properties:
      code:
        type: string
      description:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      module:
        type: string
      name:
        type: string
      position:
        type: integer
      space_id:
        type: integer
      space_name:
        type: string
      value:
        type: integer
    type: object
  model.PermissionSpace:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      name:
        type: string
      permissions:
        items:
          $ref: '#/definitions/model.Permission'
        type: array
      updated_at:
        type: string
    type: object
  model.RefreshTokenRequest:
    properties:
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    required:
    - refresh_token
    type: object
  model.RefreshTokenResponse:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      expires_in:
        description: access_token 过期时间（秒）
        example: 86400
        type: integer
    type: object
  model.RegisterRequest:
    properties:
      code:
        example: "123456"
        type: string
      email:
        example: admin@example.com
        type: string
      mobile:
        example: "13800138000"
        type: string
      password:
        example: password123
        minLength: 6
        type: string
    required:
    - code
    - password
    type: object
  model.ResetPasswordRequest:
    properties:
      new_password:
        example: newpassword123
        minLength: 6
        type: string
    required:
    - new_password
    type: object
  model.Role:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      is_system:
        type: boolean
      name:
        type: string
      role_permissions:
        items:
          $ref: '#/definitions/model.RolePermission'
        type: array
      updated_at:
        type: string
    type: object
  model.RoleDetail:
    properties:
      description:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      is_system:
        type: boolean
      name:
        type: string
      permission_codes:
        items:
          type: string
        type: array
      permissions:
        items:
          $ref: '#/definitions/model.PermissionDetail'
        type: array
    type: object
  model.RolePermission:
    properties:
      created_at:
        type: string
      id:
        type: integer
      permission:
        $ref: '#/definitions/model.Permission'
      permission_id:
        type: integer
      role:
        $ref: '#/definitions/model.Role'
      role_id:
        type: integer
      space:
        $ref: '#/definitions/model.PermissionSpace'
      space_id:
        type: integer
      updated_at:
        type: string
      value:
        description: 该空间下的位运算值
        type: integer
    type: object
  model.RolePermissionsRequest:
    properties:
      permission_codes:
        example:
        - USER_CREATE
        - USER_READ
        items:
          type: string
        minItems: 1
        type: array
    required:
    - permission_codes
    type: object
  model.SpaceWithCount:
    properties:
      description:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      name:
        type: string
      permission_count:
        type: integer
    type: object
  model.UpdateFileRequest:
    properties:
      is_private:
        type: boolean
      name:
        maxLength: 255
        minLength: 1
        type: string
    type: object
  model.UpdatePermissionRequest:
    properties:
      description:
        example: 允许创建新用户
        maxLength: 500
        type: string
      is_active:
        example: true
        type: boolean
      name:
        example: 创建用户
        maxLength: 100
        minLength: 2
        type: string
    type: object
  model.UpdateRoleRequest:
    properties:
      description:
        example: 系统管理员
        maxLength: 500
        type: string
      is_active:
        example: true
        type: boolean
      name:
        example: admin
        maxLength: 100
        minLength: 2
        type: string
    type: object
  model.UpdateUserRequest:
    properties:
      avatar_sec_uid:
        example: abc123
        type: string
      background_sec_uid:
        example: def456
        type: string
      birthday:
        example: "1990-01-01T00:00:00Z"
        type: string
      city:
        example: Beijing
        maxLength: 100
        type: string
      company:
        example: Tech Corp
        maxLength: 100
        type: string
      email:
        example: john@example.com
        type: string
      job:
        example: Software Engineer
        maxLength: 100
        type: string
      lp_id:
        example: LP_8806386288
        maxLength: 20
        minLength: 3
        type: string
      mobile:
        example: "13800138000"
        type: string
      sex:
        example: 1
        maximum: 2
        minimum: 0
        type: integer
      signature:
        example: Hello World
        maxLength: 500
        type: string
      username:
        example: john_doe
        maxLength: 50
        minLength: 1
        type: string
      website:
        example: https://example.com
        type: string
    type: object
  model.User:
    properties:
      avatar_file:
        allOf:
        - $ref: '#/definitions/model.File'
        description: Relations
      background_file:
        allOf:
        - $ref: '#/definitions/model.File'
        description: 背景文件对象
      birthday:
        type: string
      city:
        type: string
      company:
        type: string
      created_at:
        type: string
      email:
        description: 邮箱，可选
        type: string
      freezed:
        description: 是否冻结
        type: boolean
      job:
        type: string
      lp_id:
        description: LP号，类似抖音号
        type: string
      mobile:
        description: 手机号，可选
        type: string
      sec_uid:
        description: 安全标识符，对外暴露
        type: string
      sex:
        description: '性别: 0-未知, 1-男, 2-女'
        type: integer
      signature:
        type: string
      updated_at:
        type: string
      username:
        description: 用户账号
        type: string
      website:
        type: string
    type: object
  model.UserResponse:
    properties:
      avatar_file:
        $ref: '#/definitions/model.AvatarFileResponse'
      background_file:
        $ref: '#/definitions/model.AvatarFileResponse'
      birthday:
        type: string
      city:
        type: string
      company:
        type: string
      created_at:
        type: string
      email:
        type: string
      freezed:
        type: boolean
      job:
        type: string
      lp_id:
        type: string
      mobile:
        type: string
      roles:
        items:
          type: string
        type: array
      sec_uid:
        type: string
      sex:
        type: integer
      signature:
        type: string
      updated_at:
        type: string
      username:
        type: string
      website:
        type: string
    type: object
  response.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  service.CompletePart:
    properties:
      etag:
        type: string
      part_number:
        type: integer
    type: object
host: localhost:9527
info:
  contact: {}
  description: |-
    A RESTful API starter with Go, Gin, and GORM

    **LLMs 入口：**
    - [llms.txt](/llms.txt) - AI 可读接口概览
    - [llms-full.txt](/llms-full.txt) - AI 可读完整文档
  title: Go API Starter
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: 使用手机号或邮箱和密码登录
      parameters:
      - description: 登录请求数据
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.LoginResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
      summary: 用户登录
      tags:
      - 认证
  /api/v1/auth/logout:
    post:
      description: 使当前令牌失效（需要 Redis 支持）
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 用户登出
      tags:
      - 认证
  /api/v1/auth/logout-all:
    post:
      description: 使当前用户的所有令牌失效
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 登出所有设备
      tags:
      - 认证
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: 使用刷新令牌获取新的访问令牌
      parameters:
      - description: 刷新令牌请求数据
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.RefreshTokenResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
      summary: 刷新访问令牌
      tags:
      - 认证
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: 使用邮箱或手机号 + 密码注册一个新用户，注册成功后自动返回登录令牌
      parameters:
      - description: 注册请求数据
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.LoginResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.Response'
      summary: 注册新用户
      tags:
      - 认证
  /api/v1/auth/reset-password/{id}:
    post:
      consumes:
      - application/json
      description: 重置指定用户的密码（仅管理员）
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      - description: 重置密码请求数据
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 重置用户密码（管理员）
      tags:
      - 认证
  /api/v1/file:
    get:
      description: 获取文件分页列表，未登录只返回公开文件
      parameters:
      - description: 页码（默认 1）
        in: query
        name: page
        type: integer
      - description: 每页数量（默认 10）
        in: query
        name: page_size
        type: integer
      - description: 排序（如 created_at,desc）
        in: query
        name: sort
        type: string
      - description: 按用户 SecUID 筛选
        in: query
        name: user_sec_uid
        type: string
      - description: 是否仅返回私密文件（需认证）
        in: query
        name: is_private
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      summary: 获取文件列表（可选认证）
      tags:
      - 文件管理
  /api/v1/file/{sec_uid}:
    delete:
      description: 从 OSS 和数据库中删除文件
      parameters:
      - description: 文件 SecUID
        in: path
        name: sec_uid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 删除文件
      tags:
      - 文件管理
    get:
      consumes:
      - application/json
      description: 根据 SecUID 获取文件信息
      parameters:
      - description: 文件 SecUID
        in: path
        name: sec_uid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.File'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      summary: 获取文件详情
      tags:
      - 文件管理
    put:
      consumes:
      - application/json
      description: 更新文件的名称或隐私设置
      parameters:
      - description: 文件 SecUID
        in: path
        name: sec_uid
        required: true
        type: string
      - description: 更新请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.UpdateFileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.File'
              type: object
      summary: 更新文件信息
      tags:
      - 文件管理
  /api/v1/file/public/upload:
    post:
      consumes:
      - multipart/form-data
      description: 直接上传文件到 OSS 的 public 目录，不落库。适合头像等小文件场景。
      parameters:
      - description: 要上传的文件
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      summary: 公开文件上传（无需鉴权）
      tags:
      - 文件管理
  /api/v1/file/upload/abort:
    post:
      consumes:
      - application/json
      description: 取消分片上传并清理已上传的分片
      parameters:
      - description: 取消请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.AbortMultipartRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      summary: 取消分片上传
      tags:
      - 文件管理
  /api/v1/file/upload/complete:
    post:
      consumes:
      - application/json
      description: 统一的上传完成接口，支持普通上传和分片上传
      parameters:
      - description: 完成请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.UploadCompleteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.File'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      summary: 完成上传
      tags:
      - 文件管理
  /api/v1/file/upload/init:
    post:
      consumes:
      - application/json
      description: 统一的上传初始化接口，自动检查秒传，根据文件大小决定普通/分片上传
      parameters:
      - description: 初始化请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.UploadInitRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      summary: 初始化上传
      tags:
      - 文件管理
